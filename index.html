    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --primary-light: #10b981;
            --secondary: #0891b2;
            --accent: #f59e0b;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius: 16px;
            --radius-lg: 24px;
        }
 
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
 
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }
 
        .header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
        .header p { font-size: 0.875rem; opacity: 0.9; margin-top: 2px; }
 
        .header-info { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
 
        .header-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
 
        .progress-bar { display: flex; gap: 6px; margin-top: 16px; }
 
        .progress-step {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            transition: all 0.3s ease;
        }
 
        .progress-step.active { background: white; }
 
        .main { padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; }
 
        .card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: slideUp 0.4s ease;
        }
 
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
 
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
 
        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
 
        .card-title { font-size: 1rem; font-weight: 700; color: var(--text); }
        .card-subtitle { font-size: 0.75rem; color: var(--text-light); }
 
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
 
        .btn {
            padding: 16px;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }
 
        .btn:active { transform: scale(0.97); }
 
        .btn.selected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
 
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 18px 24px;
            font-size: 1.1rem;
            box-shadow: var(--shadow-lg);
        }
 
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-full { width: 100%; }
 
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 4px;
        }
 
        .btn-list .btn {
            justify-content: flex-start;
            text-align: left;
            padding: 14px 16px;
            font-size: 0.9rem;
        }
 
        .btn-list .btn.selected::before { content: "✓"; margin-right: 8px; font-weight: bold; }
 
        .input-group { margin-bottom: 12px; }
        .input-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
 
        .input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s ease;
        }
 
        .input:focus { outline: none; border-color: var(--primary); background: white; }
 
        .input-number { width: 90px; text-align: center; font-size: 1.25rem; font-weight: 700; padding: 12px; }
        textarea.input { resize: none; min-height: 100px; }
        select.input { cursor: pointer; }
 
        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
 
        .tabs::-webkit-scrollbar { display: none; }
 
        .tab {
            flex-shrink: 0;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 2px solid var(--border);
            background: white;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
 
        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
 
        .inventory-list { background: var(--bg); border-radius: var(--radius); overflow: hidden; }
 
        .inventory-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: white;
            border-bottom: 1px solid var(--border);
        }
 
        .inventory-item:last-child { border-bottom: none; }
        .inventory-item-name { font-weight: 600; font-size: 0.95rem; }
        .inventory-item-unit { font-size: 0.75rem; color: var(--text-light); }
 
        .photo-capture {
            border: 3px dashed var(--primary);
            border-radius: var(--radius-lg);
            padding: 32px;
            text-align: center;
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 100%);
            cursor: pointer;
            transition: all 0.2s ease;
        }
 
        .photo-capture:active {
            transform: scale(0.98);
            background: linear-gradient(135deg, #d1fae5 0%, #ccfbf1 100%);
        }
 
        .photo-capture-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            box-shadow: var(--shadow-lg);
        }
 
        .photo-capture-text { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
        .photo-capture-hint { font-size: 0.85rem; color: var(--text-light); margin-top: 8px; }
 
        .photo-grid { display: grid; gap: 12px; margin-top: 16px; }
 
        .photo-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
        }
 
        .photo-preview { width: 100%; height: 180px; object-fit: cover; }
        .photo-info { padding: 12px; color: white; }
        .photo-time { font-weight: 700; font-size: 1rem; }
        .photo-meta { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }
 
        .photo-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 36px;
            height: 36px;
            background: var(--danger);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }
 
        .toggle-container { display: flex; align-items: center; justify-content: space-between; }
 
        .toggle {
            width: 56px;
            height: 32px;
            background: #cbd5e1;
            border-radius: 16px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
 
        .toggle.active { background: var(--danger); }
 
        .toggle::after {
            content: "";
            position: absolute;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
 
        .toggle.active::after { left: 27px; }
 
        .summary-list { display: flex; flex-direction: column; gap: 12px; }
 
        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
 
        .summary-label { color: var(--text-light); font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .summary-value { font-weight: 700; font-size: 0.95rem; text-align: right; max-width: 60%; }
 
        .alert {
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: shake 0.4s ease;
        }
 
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
 
        .alert-error { background: var(--danger-light); border: 1px solid #fecaca; color: var(--danger); }
        .alert-icon { font-size: 1.5rem; flex-shrink: 0; }
 
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            z-index: 100;
        }
 
        .bottom-nav .btn { flex: 1; padding: 16px; }
        .btn-secondary { background: var(--bg); color: var(--text); border: 2px solid var(--border); }
 
        .success-screen {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
 
        .success-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 32px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: bounceIn 0.6s ease;
        }
 
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
 
        .success-icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            box-shadow: var(--shadow-lg);
        }
 
        .success-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 8px; }
        .success-subtitle { color: var(--text-light); margin-bottom: 24px; }
 
        .success-details {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
 
        .success-detail { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; }
        .success-detail:not(:last-child) { border-bottom: 1px solid var(--border); }
 
        .loading-screen {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
 
        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: var(--primary-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
 
        @keyframes spin { to { transform: rotate(360deg); } }
 
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
 
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
 
        .modal {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 340px;
            width: 100%;
            animation: slideUp 0.3s ease;
        }
 
        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
        }
 
        .modal-title { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .modal-buttons { display: flex; flex-direction: column; gap: 10px; }
        .modal-buttons .btn { padding: 16px; }
 
        .btn-breakfast { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; border: none; }
        .btn-lunch { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); color: white; border: none; }
        .btn-dinner { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border: none; }
 
        .intro-logo {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
            box-shadow: var(--shadow-xl);
        }
 
        .intro-text { text-align: center; color: var(--text-light); font-size: 0.95rem; margin-bottom: 24px; }
 
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mb-4 { margin-bottom: 16px; }
        .text-danger { color: var(--danger); }
        .bg-danger-light { background: var(--danger-light); }
        .emergency-card { background: var(--danger-light); border: 2px solid #fecaca; }
 
        .counter-badge {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

        // ==================== AUTO-GUARDADO ====================
        const STORAGE_KEY = 'dgcp_reporte_progreso';
        
        function guardarEstado() {
            try {
                const estadoGuardar = {
                    paso: state.paso,
                    zona: state.zona,
                    centro: state.centro,
                    supervisor: state.supervisor,
                    horaInicio: state.horaInicio ? state.horaInicio.toISOString() : null,
                    ubicacion: state.ubicacion,

                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(estadoGuardar));
            } catch (e) {
                console.log('Error guardando estado:', e);
            }
        }
        
        function cargarEstado() {
            try {
                const guardado = localStorage.getItem(STORAGE_KEY);
                if (!guardado) return null;
                
                const datos = JSON.parse(guardado);
                
                // Verificar si es del mismo día
                const fechaGuardado = new Date(datos.guardadoEn);
                const hoy = new Date();
                if (fechaGuardado.toDateString() !== hoy.toDateString()) {
                    limpiarEstado();
                    return null;
                }
                
                return datos;
            } catch (e) {
                console.log('Error cargando estado:', e);
                return null;
            }
        }
        
        function restaurarEstado(datos) {
            state.paso = datos.paso || 0;
            state.zona = datos.zona || '';
            state.centro = datos.centro || '';
            state.supervisor = datos.supervisor || '';
            state.horaInicio = datos.horaInicio ? new Date(datos.horaInicio) : null;
            state.ubicacion = datos.ubicacion || null;
            state.inventario = datos.inventario || {};
            state.fotos = datos.fotos || [];
            state.comentarios = datos.comentarios || '';
            state.esEmergencia = datos.esEmergencia || false;
            state.motivoEmergencia = datos.motivoEmergencia || '';
            state.centroEmergencia = datos.centroEmergencia || '';
            state.categoriaActiva = datos.categoriaActiva || 'bodega_seca';
            state.modalRecuperar = false;
        }
        
        function limpiarEstado() {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) {
                console.log('Error limpiando estado:', e);
            }
        }
        
        function verificarEstadoGuardado() {
            const datos = cargarEstado();
            if (datos && datos.paso > 0) {
                state.modalRecuperar = true;
                state.datosRecuperar = datos;
                render();
                return true;

            return false;

        function continuarDondeQuede() {

                state.datosRecuperar = null;

        // ==================== UTILITIES ====================
        function formatTime(date) {
            return date.toLocaleTimeString('es-SV', { hour: '2-digit', minute: '2-digit' });
        }
 
        function formatDate(date) {
            return date.toLocaleDateString('es-SV', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }
 
        function formatDateTime(date) {
            return `${formatDate(date)} ${formatTime(date)}`;
        }
 
        // ==================== GEOLOCATION ====================
        function obtenerUbicacion() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocalización no soportada'));
                    return;
                }
 
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                    },
                    (err) => {
                        reject(new Error('No se pudo obtener ubicación. Active el GPS.'));
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            });
        }
 
        // ==================== PHOTO HANDLING ====================
        function procesarFoto(file, tiempoComida) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 1200;
                        const scale = Math.min(1, maxWidth / img.width);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const padding = 16;
                        const lineHeight = Math.max(20, canvas.height * 0.028);
                        const boxHeight = lineHeight * 5 + padding * 2;
                        
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                        ctx.fillRect(0, canvas.height - boxHeight, canvas.width, boxHeight);
                        
                        ctx.fillStyle = '#FFFFFF';
                        ctx.font = `bold ${lineHeight}px Plus Jakarta Sans, sans-serif`;
                        
                        const fecha = new Date();
                        let y = canvas.height - boxHeight + padding + lineHeight;
                        
                        ctx.fillText(`📅 ${formatDate(fecha)}   🕐 ${formatTime(fecha)}`, padding, y);
                        y += lineHeight + 6;
                        ctx.fillText(`🍽️ ${tiempoComida.toUpperCase()}`, padding, y);
                        y += lineHeight + 6;
                        ctx.font = `${lineHeight * 0.9}px Plus Jakarta Sans, sans-serif`;
                        ctx.fillText(`📍 ${state.centro}`, padding, y);
                        y += lineHeight + 4;
                        ctx.font = `${lineHeight * 0.75}px Plus Jakarta Sans, sans-serif`;
                        ctx.fillStyle = '#94a3b8';
                        if (state.ubicacion) {
                            ctx.fillText(`LAT: ${state.ubicacion.lat.toFixed(6)} | LNG: ${state.ubicacion.lng.toFixed(6)}`, padding, y);
                        }
                        
                        resolve({
                            imagen: canvas.toDataURL('image/jpeg', 0.85),
                            tiempoComida,
                            fecha: formatDate(fecha),
                            hora: formatTime(fecha),
                            ubicacion: state.ubicacion
                        });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
 
        // ==================== VALIDATION ====================
        function validarFormulario() {
            if (!state.zona || !state.centro || !state.supervisor) {
                return 'Complete los datos de identificación';
            }
            if (!state.horaInicio || !state.ubicacion) {
                return 'No se registró hora o ubicación de inicio';
            }
            
            const itemsLlenados = Object.values(state.inventario).filter(v => v !== '' && v > 0).length;
            if (itemsLlenados < 3 && !state.esEmergencia) {
                return 'Complete al menos 3 items del inventario';
            }
            
            if (state.fotos.length === 0 && !state.esEmergencia) {
                return 'Agregue al menos una foto de la comida';
            }
            
            if (state.esEmergencia && (!state.motivoEmergencia || !state.centroEmergencia)) {
                return 'Complete los datos de emergencia';
            }
            
            return null;
        }
 
        // ==================== SEND REPORT ====================
        async function enviarReporte() {
            const error = validarFormulario();
            if (error) {
                state.error = error;
                render();
                return;
            }
 
            const hoy = new Date().toDateString();
            const reportesEnviados = JSON.parse(localStorage.getItem('reportesEnviados') || '{}');
            
            if (reportesEnviados[state.centro] === hoy) {
                state.error = '⚠️ Ya se envió un reporte de esta escuela hoy. No se permite enviar dos veces el mismo día.';
                state.loading = false;
                render();
                return;
            }
 
            state.loading = true;
            state.error = '';
            render();
 
            const horaFin = new Date();
            const reporte = {
                timestamp: horaFin.toISOString(),
                zona: state.zona,
                centro: state.centro,
                supervisor: state.supervisor,
                horaInicio: state.horaInicio.toISOString(),
                horaFin: horaFin.toISOString(),
                ubicacion: state.ubicacion,
                inventario: state.inventario,
                fotos: state.fotos.map(f => ({
                    tiempoComida: f.tiempoComida,
                    fecha: f.fecha,
                    hora: f.hora
                })),
                fotosBase64: state.fotos.map(f => f.imagen),
                comentarios: state.comentarios,
                esEmergencia: state.esEmergencia,
                motivoEmergencia: state.motivoEmergencia,
                centroEmergencia: state.centroEmergencia
            };
 
            try {
                localStorage.setItem('ultimoReporte', JSON.stringify({
                    ...reporte,
                    fotosBase64: undefined
                }));
            } catch (e) {
                console.log('No se pudo guardar localmente');
            }
 
            try {
                // ⚠️ IMPORTANTE: Reemplazar esta URL con la nueva URL de tu Apps Script
                await fetch('https://script.google.com/macros/s/AKfycby8l22wy5JDtSsPGhdpm0jfdcvIKlXxJkhcSzWvebQTfTimd6XtRzHSHAXDamaoS9Pg/exec', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reporte)
                });
                
                reportesEnviados[state.centro] = hoy;
                localStorage.setItem('reportesEnviados', JSON.stringify(reportesEnviados));
                
                // Limpiar el estado guardado después de enviar exitosamente
                limpiarEstado();
                
                state.loading = false;
                state.enviado = true;
                render();
                
            } catch (err) {
                console.log('Error de red, pero el reporte puede haberse enviado');
                
                // Limpiar el estado guardado
                limpiarEstado();
                
                state.loading = false;
                state.enviado = true;
                render();
            }
        }

                        <div>
                            <div class="card-title">Comentarios Importantes</div>
                            <div class="card-subtitle">Mantenimientos, utensilios dañados o faltantes</div>
                        </div>
                    </div>
                    <textarea 
                        class="input" 
                        placeholder="Escriba sus observaciones aquí..."
                        onchange="state.comentarios = this.value; guardarEstado();"
                    >${state.comentarios}</textarea>
                </div>
                
                <div class="card ${state.esEmergencia ? 'emergency-card' : ''}">
                    <div class="toggle-container">
                        <div class="card-header" style="margin-bottom: 0;">
                            <div class="card-icon" style="background: ${state.esEmergencia ? '#fee2e2' : '#ffedd5'};">⚠️</div>
                            <div>
                                <div class="card-title">Movimiento de Emergencia</div>
                            </div>
                        </div>
                        <div class="toggle ${state.esEmergencia ? 'active' : ''}" onclick="toggleEmergencia()"></div>
                    </div>
                    
                    ${state.esEmergencia ? `
                        <div style="margin-top: 20px;">
                            <div class="input-group">
                                <label class="input-label">Motivo de la emergencia *</label>
                                <textarea 
                                    class="input" 
                                    placeholder="Describa el motivo..."
                                    style="min-height: 80px;"
                                    onchange="state.motivoEmergencia = this.value; guardarEstado();"
                                >${state.motivoEmergencia}</textarea>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Centro de traslado *</label>
                                <select class="input" onchange="state.centroEmergencia = this.value; guardarEstado();">
                                    <option value="">Seleccione centro...</option>
                                    ${Object.values(ESCUELAS_DATA).flat().map(c => `
                                        <option value="${c}" ${state.centroEmergencia === c ? 'selected' : ''}>${c}</option>
                                    `).join('')}
                                </select>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }
 
        // ==================== PASO 4: RESUMEN ====================
        function renderPaso4() {
            const itemsCount = Object.values(state.inventario).filter(v => v !== '' && v > 0).length;
            
            return `
                <div class="card" style="padding: 0; overflow: hidden;">
                    <div style="background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); padding: 16px; color: white;">
                        <h3 style="font-weight: 700;">📋 Resumen del Reporte</h3>
                    </div>
                    <div style="padding: 20px;">
                        <div class="summary-list">
                            <div class="summary-item">
                                <span class="summary-label">📍 Zona</span>
                                <span class="summary-value" style="background: #fef3c7; padding: 4px 12px; border-radius: 8px;">${state.zona}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">🏢 Centro</span>
                                <span class="summary-value" style="font-size: 0.85rem;">${state.centro}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">👤 Supervisor</span>
                                <span class="summary-value">${state.supervisor}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">🕐 Hora inicio</span>
                                <span class="summary-value" style="color: var(--primary);">${state.horaInicio ? formatTime(state.horaInicio) : '-'}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">📦 Inventario</span>
                                <span class="summary-value">${itemsCount} items</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">📸 Fotos</span>
                                <span class="summary-value">${state.fotos.length}</span>
                            </div>
                            ${state.esEmergencia ? `
                                <div class="summary-item" style="background: #fef2f2; margin: 0 -20px; padding: 12px 20px; border: none;">
                                    <span class="summary-label" style="color: var(--danger); font-weight: 700;">⚠️ EMERGENCIA</span>
                                    <span class="summary-value text-danger" style="font-size: 0.8rem;">${state.centroEmergencia}</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
                
                <div class="card" style="background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 100%); border-color: #a7f3d0;">
                    <p style="text-align: center; color: var(--primary-dark);">
                        <strong>📧 El reporte se enviará a:</strong><br>
                        <span style="color: var(--primary); font-weight: 700;">proyectoescuelasdgcp@gmail.com</span>
                    </p>
                </div>
            `;
        }
 
        // ==================== EVENT HANDLERS ====================
        function seleccionarZona(zona) {
            state.zona = zona;
            state.centro = '';
            state.supervisor = '';
            state.error = '';
            render();
        }
 
        function seleccionarCentro(centro) {
            state.centro = centro;
            state.error = '';
            render();
        }
 
        function seleccionarSupervisor(supervisor) {
            state.supervisor = supervisor;
            state.error = '';
            render();
        }
 
        async function iniciarFormulario() {
            state.error = '';
            state.loading = true;
            render();
 
            try {
                state.ubicacion = await obtenerUbicacion();
                state.horaInicio = new Date();
                state.paso = 1;
                guardarEstado(); // Guardar al iniciar el formulario
            } catch (err) {
                state.error = err.message;
            }
            
            state.loading = false;
            render();
        }
 
        function cambiarCategoria(categoria) {
            state.categoriaActiva = categoria;
            guardarEstado();
            render();
        }
 
        function actualizarInventario(categoria, item, valor) {
            state.inventario[`${categoria}_${item}`] = valor === '' ? '' : parseFloat(valor) || 0;
            guardarEstado(); // Guardar cada vez que se actualiza inventario
        }
 
        function capturarFoto(input) {
            if (input.files && input.files[0]) {
                state.fotoTemp = input.files[0];
                state.modalTiempo = true;
                render();
            }
        }
 
        async function seleccionarTiempo(tiempo) {
            if (state.fotoTemp) {
                const foto = await procesarFoto(state.fotoTemp, tiempo);
                state.fotos.push(foto);
            }
            state.fotoTemp = null;
            state.modalTiempo = false;
            guardarEstado(); // Guardar después de agregar foto
            render();
        }
 
        function cancelarFoto() {
            state.fotoTemp = null;
            state.modalTiempo = false;
            render();
        }
 
        function cerrarModal(e) {
            if (e.target.classList.contains('modal-overlay')) {
                cancelarFoto();
            }
        }
 
        function eliminarFoto(index) {
            state.fotos.splice(index, 1);
            guardarEstado();
            render();
        }
 
        function toggleEmergencia() {
            state.esEmergencia = !state.esEmergencia;
            if (!state.esEmergencia) {
                state.motivoEmergencia = '';
                state.centroEmergencia = '';
            }
            guardarEstado();
            render();
        }
 
        function siguientePaso() {
            state.error = '';
            if (state.paso < 4) {
                state.paso++;
            }
            guardarEstado();
            render();
            window.scrollTo(0, 0);
        }
 
        function anteriorPaso() {
            state.error = '';
            if (state.paso > 0) {
                state.paso--;
            }
            guardarEstado();
            render();
            window.scrollTo(0, 0);
        }
 
        // ==================== INIT ====================
        // Verificar si hay un reporte en progreso guardado
        verificarEstadoGuardado();
        if (!state.modalRecuperar) {
            render();
        }
 
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
